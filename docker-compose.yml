services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
      POSTGRES_DB: portfolio
    volumes:
      # schema.sql + seed.sql run automatically on first start (empty data volume only)
      - ./db:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://portfolio:${POSTGRES_PASSWORD:-portfolio}@db:5432/portfolio}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        # Baked into the client bundle at build time (NEXT_PUBLIC_*)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8081}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
